<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title data-i18n="pageTitle"></title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="layout">
        <aside id="sidebar" class="sidebar" data-include="sidebar.html"></aside>
        <main class="content">
            <div class="container">

        <header id="top">
            <h1 data-common="name"></h1>
            <h2 data-common="headline"></h2>
            <div class="language-switcher">
                <span class="lang-label">VI</span>
                <label class="switch" for="lang-switch">
                    <input type="checkbox" id="lang-switch" aria-label="Language switch">
                    <span class="slider" aria-hidden="true"></span>
                </label>
                <span class="lang-label">EN</span>
            </div>
        </header>

        <div class="content-grid">
            <div class="col-left">
                <section class="contact" id="contact">
                    <h3 data-i18n="contactTitle"></h3>
                    <ul class="contact-list">
                        <li class="contact-item">
                            <span class="contact-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
                                    <path d="M3 6.75a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 6.75v10.5A2.25 2.25 0 0 1 18.75 19.5H5.25A2.25 2.25 0 0 1 3 17.25V6.75Zm2.25-.75a.75.75 0 0 0-.75.75v.217l7.5 4.688 7.5-4.688V6.75a.75.75 0 0 0-.75-.75H5.25Zm14.25 3.164-6.932 4.332a1.5 1.5 0 0 1-1.568 0L4.5 9.164v8.086c0 .414.336.75.75.75h13.5a.75.75 0 0 0 .75-.75V9.164Z" />
                                </svg>
                            </span>
                            <div class="contact-text">
                                <span class="contact-label" data-i18n="contactEmailLabel"></span>
                                <span class="contact-value" data-common="email"></span>
                            </div>
                        </li>
                        <li class="contact-item">
                            <span class="contact-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
                                    <path d="M12 2.25c-3.727 0-6.75 2.936-6.75 6.552 0 4.272 5.187 10.93 6.25 12.23a.75.75 0 0 0 1.168 0c1.063-1.3 6.25-7.958 6.25-12.23 0-3.616-3.023-6.552-6.75-6.552Zm0 9.75a3 3 0 1 1 0-6 3 3 0 0 1 0 6Z" />
                                </svg>
                            </span>
                            <div class="contact-text">
                                <span class="contact-label" data-i18n="contactLocationLabel"></span>
                                <span class="contact-value" data-common="location"></span>
                            </div>
                        </li>
                        <li class="contact-item">
                            <span class="contact-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
                                    <path d="M12 2.25a9.75 9.75 0 1 0 9.75 9.75A9.762 9.762 0 0 0 12 2.25Zm0 1.5a8.25 8.25 0 1 1 0 16.5 8.25 8.25 0 0 1 0-16.5Zm.75 4.5a.75.75 0 0 0-1.5 0V12c0 .414.336.75.75.75h3a.75.75 0 0 0 0-1.5h-2.25V8.25Z" />
                                </svg>
                            </span>
                            <div class="contact-text">
                                <span class="contact-label" data-i18n="contactAvailabilityLabel"></span>
                                <span class="contact-value" data-i18n="contactAvailabilityValue"></span>
                            </div>
                        </li>
                    </ul>
                    <div class="social-links">
                        <a class="social-link" data-common-href="githubUrl" target="_blank" rel="noopener">
                            <span class="contact-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
                                    <path d="M12 .5a11.5 11.5 0 0 0-3.63 22.41c.58.1.8-.25.8-.57v-2.1c-3.26.73-3.95-1.4-3.95-1.4-.54-1.34-1.33-1.7-1.33-1.7-1.09-.72.08-.7.08-.7 1.2.08 1.83 1.2 1.83 1.2 1.07 1.78 2.8 1.26 3.48.96.1-.75.42-1.26.76-1.55-2.6-.28-5.34-1.26-5.34-5.62 0-1.25.47-2.28 1.23-3.08-.13-.3-.53-1.55.12-3.23 0 0 1-.31 3.3 1.18a11.4 11.4 0 0 1 6 0c2.3-1.49 3.29-1.18 3.29-1.18.65 1.68.25 2.93.12 3.23.76.8 1.22 1.83 1.22 3.08 0 4.37-2.74 5.34-5.36 5.62.43.37.82 1.1.82 2.22v3.3c0 .32.21.68.8.57A11.5 11.5 0 0 0 12 .5Z" />
                                </svg>
                            </span>
                            <span>GitHub</span>
                        </a>
                        <a class="social-link" data-common-href="linkedinUrl" target="_blank" rel="noopener">
                            <span class="contact-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
                                    <path d="M19.5 3.75H4.5A.75.75 0 0 0 3.75 4.5v15a.75.75 0 0 0 .75.75h15a.75.75 0 0 0 .75-.75v-15a.75.75 0 0 0-.75-.75ZM8.25 18H6v-7.5h2.25V18Zm-1.125-8.625a1.312 1.312 0 1 1 0-2.625 1.312 1.312 0 0 1 0 2.625ZM18 18h-2.25v-4.125c0-.986-.018-2.25-1.375-2.25-1.375 0-1.586 1.074-1.586 2.18V18H10.5v-7.5h2.16v1.023h.03c.3-.57 1.03-1.17 2.12-1.17 2.27 0 2.69 1.495 2.69 3.438V18Z" />
                                </svg>
                            </span>
                            <span>LinkedIn</span>
                        </a>
                    </div>
                </section>

                <section class="education" id="education">
                    <h3 data-i18n="educationTitle"></h3>
                    <div class="education-list" data-i18n-education-list="educationItems"></div>
                </section>

                <section class="certificates" id="certificates">
                    <div class="section-head">
                        <h3 data-i18n="certificatesTitle"></h3>
                        <a class="more-link" href="certificates.html" data-i18n="certificatesMore"></a>
                    </div>
                    <ul data-i18n-list="certificatesItems"></ul>
                </section>
            </div>

            <div class="col-right">
                <section class="about" id="about">
                    <h3 data-i18n="aboutTitle"></h3>
                    <p>
                        <span data-i18n="aboutBody"></span>
                    </p>
                </section>

                <section class="projects" id="projects">
                    <div class="section-head">
                        <h3 data-i18n="projectsTitle"></h3>
                        <a class="more-link" href="projects.html" data-i18n="projectsMore"></a>
                    </div>

                    <div class="project">
                        <h4 data-i18n="project1Title"></h4>
                        <p data-i18n="project1Body"></p>
                    </div>

                    <div class="project">
                        <h4 data-i18n="project2Title"></h4>
                        <p data-i18n="project2Body"></p>
                    </div>

                </section>

                <section class="skills" id="skills">
                    <h3 data-i18n="skillsTitle"></h3>
                    <ul data-i18n-list="skills"></ul>
                </section>
            </div>
        </div>

        <footer id="footer">
            <p data-i18n="footer"></p>
        </footer>

            </div>
        </main>
    </div>

    <script src="index.js"></script>
</body>
</html>
